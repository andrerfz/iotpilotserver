server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://iotpilot-backend:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass Cloudflare's original proto (https), not nginx's $scheme (http)
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Socket.IO to the backend container
    location /socket.io/ {
        proxy_pass http://iotpilot-backend:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # SPA fallback — all routes serve index.html so Angular's router handles them
    location / {
        try_files $uri $uri/ /index.html;

        # Content Security Policy for the Angular app. All assets are
        # self-hosted (scripts, styles, IBM Plex fonts), so sources are locked
        # to 'self'. The production build disables inlineCritical (see
        # angular.json) so there is no inline <script>/onload — hence
        # script-src needs neither 'unsafe-inline' nor 'unsafe-eval'.
        # style-src keeps 'unsafe-inline' because Angular/Ionic inject component
        # styles at runtime. API (/api) and Socket.IO are same-origin → 'self'.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; manifest-src 'self'; worker-src 'self' blob:" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Long-lived cache for content-hashed assets emitted by ng build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
