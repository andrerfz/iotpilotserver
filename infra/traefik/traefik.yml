api:
  dashboard: true
  debug: false
  insecure: false

entryPoints:
  web:
    address: ":80"

  websecure:
    address: ":443"
    http:
      tls:
        options: default

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: iotpilot-network
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      # Traefik's static config file is parsed as plain YAML — it does NOT expand
      # ${VAR} (that's shell/compose syntax) or {{ env "VAR" }} (that's the dynamic
      # file provider's templating, unavailable here). The literal string
      # "${ACME_EMAIL}" was being sent to Let's Encrypt as the contact address and
      # rejected (invalidContact). Not a secret, so just hardcode it.
      email: "support@iotpilot.app"
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web
      # DNS challenge for wildcard certificates
      dnsChallenge:
        delayBeforeCheck: 0

# Global redirect to HTTPS
http:
  middlewares:
    default-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000

    secure-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
          - POST
          - DELETE
          - PATCH
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        referrerPolicy: "same-origin"
        customRequestHeaders:
          X-Forwarded-Proto: "https"

log:
  level: INFO

accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true

ping: {}
