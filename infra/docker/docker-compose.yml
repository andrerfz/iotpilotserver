version: '3.8'

services:
  # Tailscale Sidecar - Core networking component
  tailscale:
    image: tailscale/tailscale:latest
    container_name: iotpilot-tailscale
    hostname: iotpilot-server
    mem_limit: 64m
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
      - TS_HOSTNAME=iotpilot-server
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=true
      - TS_EXTRA_ARGS=--advertise-tags=tag:server --accept-routes
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped
    networks:
      - iotpilot-network
    command: tailscaled

  # Cloudflare Tunnel — exposes services via Cloudflare Zero Trust
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: iotpilot-cloudflared
    mem_limit: 64m
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - iotpilot-network
    depends_on:
      iotpilot-backend:
        condition: service_healthy

  # ── frontend-ng (Ionic + Angular) — PRIMARY FRONTEND (fe-cutover complete) ───
  iotpilot-ng:
    build:
      context: ../..
      dockerfile: ./infra/docker/Dockerfile
      target: production-ng
    container_name: iotpilot-ng
    mem_limit: 64m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - iotpilot-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.iotpilot-ng.loadbalancer.server.port=80"
      - "traefik.http.routers.iotpilot-ng.rule=Host(`${DOMAIN}`) || Host(`${TAILSCALE_DOMAIN}`)"
      - "traefik.http.routers.iotpilot-ng.tls=true"
      - "traefik.http.routers.iotpilot-ng.tls.certresolver=letsencrypt"
      - "traefik.http.routers.iotpilot-ng.middlewares=compression,security-headers"
      - "traefik.http.routers.iotpilot-ng.priority=100"


  # Express API Backend
  iotpilot-backend:
    build:
      context: ../..
      dockerfile: ./infra/docker/Dockerfile
      target: development
      args:
        - NODE_ENV=production
    container_name: iotpilot-backend
    mem_limit: 384m
    command: ["/bin/sh", "/app/apps/backend/start.sh"]
    environment:
      - NODE_ENV=production
      - PORT=3100
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - DEVICE_API_KEY=${DEVICE_API_KEY}
      - DOMAIN=${DOMAIN}
      - APP_URL=https://${NEXT_PUBLIC_DOMAIN_TUNEL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FROM_EMAIL=${FROM_EMAIL}
      - FROM_NAME=${FROM_NAME}
    volumes:
      - ../../apps/backend/src:/app/apps/backend/src
      - ../../packages/core/src:/app/packages/core/src
      - ../../packages/core/package.json:/app/packages/core/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3
    networks:
      - iotpilot-network

  # BullMQ Worker
  iotpilot-worker:
    build:
      context: ../..
      dockerfile: ./infra/docker/Dockerfile
      target: development
      args:
        - NODE_ENV=production
    container_name: iotpilot-worker
    mem_limit: 256m
    command: ["/bin/sh", "/app/apps/worker/start.sh"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - DEVICE_API_KEY=${DEVICE_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FROM_EMAIL=${FROM_EMAIL}
      - FROM_NAME=${FROM_NAME}
    volumes:
      - ../../apps/worker/src:/app/apps/worker/src
      - ../../packages/core/src:/app/packages/core/src
      - ../../packages/core/package.json:/app/packages/core/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - iotpilot-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: iotpilot-postgres
    mem_limit: 384m
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - iotpilot-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: iotpilot-redis
    mem_limit: 64m
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - iotpilot-network

  # Grafana for monitoring dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: iotpilot-grafana
    profiles: [monitoring]
    mem_limit: 256m
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_DOMAIN=${DOMAIN_TUNEL}
      - GF_SERVER_ROOT_URL=https://${DOMAIN_TUNEL}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-worldmap-panel,grafana-piechart-panel
      - GF_FEATURE_TOGGLES_ENABLE=ngalert
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgres:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=${POSTGRES_USER}
      - GF_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - GF_DATABASE_SSL_MODE=disable
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - iotpilot-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${DOMAIN}`) && PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.middlewares=compression,security-headers"

  # InfluxDB for time-series metrics
  influxdb:
    image: influxdb:2.7-alpine
    container_name: iotpilot-influxdb
    mem_limit: 384m
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
      - DOCKER_INFLUXDB_INIT_RETENTION=8760h
      - INFLUXD_LOG_LEVEL=warn
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ../influxdb/config:/etc/influxdb2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - iotpilot-network

  # Loki for log aggregation
  loki:
    image: grafana/loki:2.9.8
    container_name: iotpilot-loki
    profiles: [monitoring]
    mem_limit: 256m
    user: root
    volumes:
      - ../loki/config.yml:/etc/loki/config.yaml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - iotpilot-network

  # Traefik reverse proxy with Tailscale integration
  traefik:
    image: traefik:v3.0
    container_name: iotpilot-traefik
    mem_limit: 96m
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
      - DOMAIN=${DOMAIN}
      - TRAEFIK_AUTH=${TRAEFIK_AUTH}
    volumes:
      - ../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/etc/traefik/acme
      - tailscale-socket:/tmp/tailscale:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - iotpilot-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${DOMAIN}`) && PathPrefix(`/traefik`)"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=auth"

  # Prometheus for additional metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: iotpilot-prometheus
    profiles: [monitoring]
    mem_limit: 256m
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--log.level=warn'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - iotpilot-network

volumes:
  tailscale-state:
    driver: local
  tailscale-socket:
    driver: local
  postgres-data:
    driver: local
  grafana-data:
    driver: local
  influxdb-data:
    driver: local
  loki-data:
    driver: local
  traefik-certs:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local

networks:
  iotpilot-network:
    name: iotpilot-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: iotpilot0
      com.docker.network.driver.mtu: 1500
