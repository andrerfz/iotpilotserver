packages:
  # apps/frontend is the Next.js frontend (formerly app/)
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@heroui/shared-utils': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  ssh2: true
  unrs-resolver: true
