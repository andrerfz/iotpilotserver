packages:
  # apps/frontend = legacy Next.js; apps/frontend-ng = Ionic+Angular (fe-foundation)
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@heroui/shared-utils': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  cpu-features: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  prisma: true
  ssh2: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@ionic/angular@8.8.10'
  - '@ionic/core@8.8.10'
