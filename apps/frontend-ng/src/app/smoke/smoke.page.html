<ion-header>
  <ion-toolbar>
    <ion-title>Smoke</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (health()) {
    <div data-testid="health-status" class="rounded-lg bg-green-600/10 p-4 space-y-1">
      <p class="font-mono font-semibold text-green-700">status: {{ health()!.status }}</p>
      <p class="font-mono text-sm text-gray-500">uptime: {{ health()!.uptime }}s</p>
      <p class="font-mono text-sm text-gray-400">{{ health()!.timestamp }}</p>
    </div>
  } @else if (error()) {
    <div data-testid="health-error" class="rounded-lg bg-red-600/10 p-4">
      <p class="font-mono text-red-700">error: {{ error() }}</p>
    </div>
  } @else {
    <p class="text-gray-400">Connecting to backend…</p>
  }

  <div class="smoke-nav">
    <p class="smoke-nav__label">Settings pages</p>
    <div class="smoke-nav__links">
      <ion-button fill="outline" size="small" routerLink="/app/settings/profile">Profile</ion-button>
      <ion-button fill="outline" size="small" routerLink="/app/settings/notifications">Notifications</ion-button>
      <ion-button fill="outline" size="small" routerLink="/app/settings/security">Security</ion-button>
      <ion-button fill="outline" size="small" routerLink="/app/settings/system">System</ion-button>
    </div>
  </div>
</ion-content>
