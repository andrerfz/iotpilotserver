@if (password()) {
  <ul class="pwd-rules">
    @for (rule of rules(); track rule.label) {
      <li class="pwd-rule" [class.pwd-rule--valid]="rule.valid">
        <ion-icon
          [name]="rule.valid ? 'checkmark-circle-outline' : 'close-circle-outline'"
          class="pwd-rule__icon" />
        <span class="pwd-rule__label">{{ rule.label }}</span>
      </li>
    }
  </ul>
}
