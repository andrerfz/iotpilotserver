<ion-content class="ion-padding">

  <app-admin-tabs></app-admin-tabs>

  <!-- Filters -->
  <ion-card class="filter-bar">
    <ion-card-content>
      <div class="filter-row">
        <ui-search-field placeholder="Search name or email…"
          [value]="searchQuery()" (valueChange)="searchQuery.set($event)">
        </ui-search-field>
        <ui-select placeholder="All Statuses" [options]="statusOptions"
          [(ngModel)]="statusFilter" (ngModelChange)="onStatusChange($event)">
        </ui-select>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Cell templates -->
  <ng-template #statusCell let-row>
    <ui-status-badge [status]="row.status"></ui-status-badge>
  </ng-template>

  <ng-template #actionsCell let-row>
    <div class="row-actions">
      @if (row.status === 'PENDING' && isSuperAdmin()) {
        <ion-button size="small" fill="outline" color="success"
          [disabled]="actionLoading()" (click)="onApprove(row)">
          <ion-icon slot="start" name="checkmark-outline"></ion-icon>
          Approve
        </ion-button>
        <ion-button size="small" fill="outline" color="danger"
          [disabled]="actionLoading()" (click)="onReject(row)">
          <ion-icon slot="start" name="close-outline"></ion-icon>
          Reject
        </ion-button>
      }
      @if (row.status === 'ACTIVE') {
        <ion-button size="small" fill="outline" color="warning"
          [disabled]="actionLoading()" (click)="onSuspend(row)">
          <ion-icon slot="start" name="ban-outline"></ion-icon>
          Suspend
        </ion-button>
      }
      @if (row.status === 'SUSPENDED') {
        <ion-button size="small" fill="outline" color="success"
          [disabled]="actionLoading()" (click)="onActivate(row)">
          <ion-icon slot="start" name="checkmark-outline"></ion-icon>
          Activate
        </ion-button>
      }
    </div>
  </ng-template>

  <!-- Table -->
  @if (svc.error() && !svc.users().length) {
    <ui-empty-state title="Failed to load users" [hasAction]="true">
      <ion-button action fill="outline" size="small" (click)="svc.load()">Retry</ion-button>
    </ui-empty-state>
  } @else {
    <ui-data-table [columns]="cols()" [rows]="filtered()" rowKey="id" [pageSize]="20">
    </ui-data-table>
  }

</ion-content>

<!-- New User Modal -->
<ion-modal [isOpen]="showNewUserModal()" (ionModalDidDismiss)="onModalDismissed(false)">
  <ng-template>
    <app-admin-new-user-modal (dismissed)="onModalDismissed($event)"></app-admin-new-user-modal>
  </ng-template>
</ion-modal>
