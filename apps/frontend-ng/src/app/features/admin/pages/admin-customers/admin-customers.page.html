<ion-content class="ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <app-admin-tabs></app-admin-tabs>

  <!-- Filters -->
  <ion-card class="filter-bar">
    <ion-card-content>
      <div class="filter-row">
        <ui-search-field [placeholder]="'admin.customers.search_placeholder' | translate"
          [value]="searchQuery()" (valueChange)="searchQuery.set($event)">
        </ui-search-field>
        <ui-select [placeholder]="'admin.customers.all_statuses' | translate" [options]="statusOptions"
          [(ngModel)]="statusFilter" (ngModelChange)="onStatusChange($event)">
        </ui-select>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Cell templates -->
  <ng-template #statusCell let-row>
    <ui-status-badge [status]="row.status"></ui-status-badge>
  </ng-template>

  <ng-template #actionsCell let-row>
    <div class="row-actions">
      <ion-button size="small" fill="outline" color="medium"
        [disabled]="actionLoading()" (click)="onEdit(row)">
        <ion-icon slot="start" name="pencil-outline"></ion-icon>
        {{ 'admin.customers.actions.edit' | translate }}
      </ion-button>
      @if (row.status !== 'INACTIVE') {
        <ion-button size="small" fill="outline" color="warning"
          [disabled]="actionLoading()" (click)="onDeactivate(row)">
          <ion-icon slot="start" name="ban-outline"></ion-icon>
          {{ 'admin.customers.actions.deactivate' | translate }}
        </ion-button>
      }
    </div>
  </ng-template>

  <!-- Table -->
  @if (svc.error() && !svc.customers().length) {
    <ui-empty-state [title]="'admin.customers.failed.title' | translate" [hasAction]="true">
      <ion-button action fill="outline" size="small" (click)="svc.load()">{{ 'admin.customers.failed.retry' | translate }}</ion-button>
    </ui-empty-state>
  } @else {
    <ui-data-table [columns]="cols()" [rows]="filtered()" rowKey="id" [pageSize]="20">
    </ui-data-table>
  }

</ion-content>
