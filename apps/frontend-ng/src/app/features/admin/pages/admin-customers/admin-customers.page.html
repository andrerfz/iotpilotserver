<ion-content class="ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- Filters -->
  <ion-card class="filter-bar">
    <ion-card-content>
      <div class="filter-row">
        <ui-search-field [placeholder]="'admin.customers.search_placeholder' | translate"
          [value]="searchQuery()" (valueChange)="searchQuery.set($event)">
        </ui-search-field>
        <ui-select [placeholder]="'admin.customers.all_statuses' | translate" [options]="statusOptions"
          [(ngModel)]="statusFilter" (ngModelChange)="onStatusChange($event)">
        </ui-select>
      </div>
    </ion-card-content>
  </ion-card>

  @if (svc.error() && !svc.customers().length) {
    <ui-empty-state [title]="'admin.customers.failed.title' | translate" [hasAction]="true">
      <ion-button action fill="outline" size="small" (click)="svc.load()">{{ 'admin.customers.failed.retry' | translate }}</ion-button>
    </ui-empty-state>
  } @else if (!filtered().length) {
    <ui-empty-state [title]="'admin.customers.empty.title' | translate"></ui-empty-state>
  } @else {
    <ui-swipe-list [items]="filtered()" [actions]="rowActions"
      (itemClick)="onEdit($any($event))" (action)="onSwipeAction($any($event))">
      <ng-template #itemContent let-c>
        <ui-list-row
          [title]="c.name"
          [subtitle]="c.slug"
          [meta]="['Status', c.status]"
          [cols]="[{ label: 'Status', value: c.status }, { label: 'Slug', value: c.slug }]">
          <ui-status-dot lead [status]="c.status"></ui-status-dot>
        </ui-list-row>
      </ng-template>
    </ui-swipe-list>
  }

</ion-content>

<!-- Add / edit customer -->
<ui-bottom-sheet #editSheet
  [title]="(editingId() ? 'admin.dialogs.customer_edit' : 'admin.dialogs.customer_new') | translate"
  [saveLabel]="(editingId() ? 'common.save' : 'common.create') | translate"
  [saveDisabled]="actionLoading() || !formName().trim()"
  (save)="onSaveSheet()">
  <div class="edit-form">
    <ui-input
      [label]="'fields.name' | translate"
      [ngModel]="formName()" (ngModelChange)="formName.set($event)" name="custName">
    </ui-input>
    @if (!editingId()) {
      <ui-input
        type="email"
        [label]="'admin.customers.fields.contact_email' | translate"
        [ngModel]="formEmail()" (ngModelChange)="formEmail.set($event)" name="custEmail">
      </ui-input>
    }
  </div>
</ui-bottom-sheet>
