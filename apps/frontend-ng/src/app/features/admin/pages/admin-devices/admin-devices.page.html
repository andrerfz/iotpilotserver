<ion-content class="ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <app-admin-tabs></app-admin-tabs>

  <!-- Stat cards -->
  <div class="admin-stats">
    <ui-metric-card label="Total"    [value]="svc.stats().total"       [loading]="svc.loading() && !svc.devices().length">
      <ion-icon icon name="hardware-chip-outline"></ion-icon>
    </ui-metric-card>
    <ui-metric-card label="Online"   [value]="svc.stats().online"      [loading]="svc.loading() && !svc.devices().length"
      iconColor="var(--success)" iconBg="var(--success-weak)">
      <ion-icon icon name="checkmark-circle-outline"></ion-icon>
    </ui-metric-card>
    <ui-metric-card label="Offline"  [value]="svc.stats().offline"     [loading]="svc.loading() && !svc.devices().length">
      <ion-icon icon name="close-circle-outline"></ion-icon>
    </ui-metric-card>
    <ui-metric-card label="Issues"   [value]="svc.stats().error"       [loading]="svc.loading() && !svc.devices().length"
      iconColor="var(--danger)" iconBg="var(--danger-weak)">
      <ion-icon icon name="warning-outline"></ion-icon>
    </ui-metric-card>
  </div>

  <!-- Filters -->
  <ion-card class="filter-bar">
    <ion-card-content>
      <div class="filter-row">
        <ui-search-field placeholder="Search hostname, ID or IP…"
          [value]="searchQuery()" (valueChange)="searchQuery.set($event)">
        </ui-search-field>
        <ui-select placeholder="All Statuses" [options]="statusOptions"
          [(ngModel)]="statusFilter" (ngModelChange)="onStatusChange($event)">
        </ui-select>
        <ion-button fill="outline" color="medium" size="small" (click)="svc.load(statusFilter || undefined)" [disabled]="svc.loading()">
          <ion-icon slot="icon-only" name="reload-outline"></ion-icon>
        </ion-button>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Cell templates (outside @if so ViewChild resolves) -->
  <ng-template #statusCell let-row>
    <ui-status-badge [status]="row.status"></ui-status-badge>
  </ng-template>

  <ng-template #typeCell let-row>
    <ui-device-type-badge [type]="row.deviceType"></ui-device-type-badge>
  </ng-template>

  <ng-template #actionsCell let-row>
    <div class="row-actions">
      <ion-button size="small" fill="outline" [routerLink]="['/app/devices', row.id]">
        View
      </ion-button>
      @if (row.status === 'ONLINE') {
        <ion-button size="small" fill="outline" color="warning"
          [disabled]="actionLoading()" (click)="onRestart(row)">
          <ion-icon slot="start" name="refresh-outline"></ion-icon>
          Restart
        </ion-button>
      }
    </div>
  </ng-template>

  <!-- Table -->
  @if (svc.error() && !svc.devices().length) {
    <ui-empty-state title="Failed to load devices" [hasAction]="true">
      <ion-button action fill="outline" size="small" (click)="svc.load()">Retry</ion-button>
    </ui-empty-state>
  } @else {
    <ui-data-table [columns]="cols()" [rows]="filtered()" rowKey="id" [pageSize]="20">
    </ui-data-table>
  }

</ion-content>
