version: 2
updates:
  # npm — active workspace packages (pnpm monorepo).
  # NOTE: /app was renamed to apps/* in the monorepo migration; the old path
  # produced 10 orphaned PRs. apps/frontend (legacy Next.js) is intentionally
  # NOT watched here — it is being replaced by the Ionic/Angular frontend and
  # removed at fe-cutover. Dependabot SECURITY updates still fire for it
  # regardless of this config; only version-bump noise is suppressed.
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/backend"
      - "/apps/worker"
      - "/packages/core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "andrerfz"
    assignees:
      - "andrerfz"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Batch low-risk updates into a single PR per directory to cut noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Hold majors of critical runtime/db packages for manual upgrades.
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "andrerfz"
    assignees:
      - "andrerfz"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "docker"
      - "dependencies"
      - "automated"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "andrerfz"
    assignees:
      - "andrerfz"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "ci"
      - "automated"
    groups:
      # One PR for all CI action bumps instead of one per action.
      ci-actions:
        update-types:
          - "minor"
          - "patch"
          - "major"
