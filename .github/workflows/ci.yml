name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, main-ddd-migration ]
  pull_request:
    branches: [ main, develop, main-ddd-migration ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  DOCKER_COMPOSE_FILE: docker/docker-compose.yml

jobs:
  # ==========================================
  # TEST JOB - Run all tests with coverage
  # ==========================================
  test:
    name: 'Test Suite'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: iotpilot
          POSTGRES_PASSWORD: iotpilot
          POSTGRES_DB: iotpilot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Create test environment file
        run: |
          cd app
          cp .env.local .env.test
          echo "NODE_ENV=test" >> .env.test
          echo "DATABASE_URL=postgresql://iotpilot:iotpilot@localhost:5432/iotpilot_test" >> .env.test
          echo "REDIS_URL=redis://localhost:6379" >> .env.test
          echo "JWT_SECRET=test-jwt-secret-for-ci" >> .env.test
          echo "INFLUXDB_URL=http://localhost:8087" >> .env.test
          echo "INFLUXDB_TOKEN=test-token" >> .env.test
          echo "INFLUXDB_ORG=iotpilot" >> .env.test
          echo "INFLUXDB_BUCKET=devices" >> .env.test

      - name: Install dependencies
        run: |
          cd app
          npm ci

      - name: Setup test database
        run: |
          cd app
          npx prisma generate
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://iotpilot:iotpilot@localhost:5432/iotpilot_test

      - name: Run linting
        run: |
          cd app
          npm run lint

      - name: Run unit tests
        run: |
          cd app
          npm run test:unit -- --coverage --run
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://iotpilot:iotpilot@localhost:5432/iotpilot_test
          REDIS_URL: redis://localhost:6379

      - name: Run integration tests
        run: |
          cd app
          npm run test:integration -- --run
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://iotpilot:iotpilot@localhost:5432/iotpilot_test
          REDIS_URL: redis://localhost:6379

      - name: Run e2e tests
        run: |
          cd app
          npm run test:e2e -- --run
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://iotpilot:iotpilot@localhost:5432/iotpilot_test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./app/coverage/
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: |
            app/coverage/
            app/test-results/
          retention-days: 30

  # ==========================================
  # SECURITY SCANNING
  # ==========================================
  security:
    name: 'Security Scan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: |
          cd app
          npm ci

      - name: Run npm audit
        run: |
          cd app
          npm audit --audit-level moderate

      - name: Run security linting
        run: |
          cd app
          npx eslint --ext .ts,.tsx --config .eslintrc.js src/ --format=compact || true

  # ==========================================
  # BUILD JOB - Build Docker images
  # ==========================================
  build:
    name: 'Build & Validate'
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} build --no-cache

      - name: Validate Docker Compose configuration
        run: |
          docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} config

      - name: Build frontend assets
        run: |
          cd app
          npm run build

  # ==========================================
  # PERFORMANCE TESTS
  # ==========================================
  performance:
    name: 'Performance Tests'
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: iotpilot
          POSTGRES_PASSWORD: iotpilot
          POSTGRES_DB: iotpilot_perf_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: |
          cd app
          npm ci

      - name: Setup performance test database
        run: |
          cd app
          npx prisma generate
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://iotpilot:iotpilot@localhost:5432/iotpilot_perf_test

      - name: Run performance tests
        run: |
          cd app
          npm run test:performance -- --run
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://iotpilot:iotpilot@localhost:5432/iotpilot_perf_test
          REDIS_URL: redis://localhost:6379

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ github.run_number }}
          path: app/performance-results/
          retention-days: 30

  # ==========================================
  # DEPLOYMENT PREPARATION
  # ==========================================
  deploy-prep:
    name: 'Deploy Preparation'
    runs-on: ubuntu-latest
    needs: [test, security, build, performance]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate deployment artifact
        run: |
          # Create deployment package
          mkdir -p deployment
          cp -r app/* deployment/
          cp -r docker/* deployment/
          cp docker-compose.yml deployment/ 2>/dev/null || true
          cp Makefile deployment/

          # Remove unnecessary files
          cd deployment
          rm -rf node_modules .git .github tests coverage *.log

          # Create deployment archive
          tar -czf ../iotpilot-server-${{ github.sha }}.tar.gz .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: iotpilot-server-${{ github.sha }}.tar.gz
          retention-days: 7

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "- Build Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Performance Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ready for production deployment** 🎉" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # DEPLOYMENT (Optional - requires manual trigger)
  # ==========================================
  deploy:
    name: 'Deploy to Production'
    runs-on: ubuntu-latest
    needs: [deploy-prep]
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deployment artifact
        uses: actions/download-artifact@v7
        with:
          name: deployment-package

      - name: Deploy to production
        run: |
          echo "🚀 Starting production deployment..."
          # Add your deployment commands here
          # This could be SSH to your server, using deployment tools, etc.
          echo "✅ Deployment completed (placeholder)"

      - name: Post-deployment health check
        run: |
          echo "🔍 Running post-deployment health checks..."
          # Add health check commands here
          echo "✅ Health checks passed"