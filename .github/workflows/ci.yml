name: CI

on:
  push:
    branches: [main, main-ddd-migration]
  pull_request:
    branches: [main, main-ddd-migration]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Single install: pnpm handles entire workspace
  # ──────────────────────────────────────────────
  build:
    name: Install + lint + type-check + tests
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: iotpilot
          POSTGRES_PASSWORD: iotpilot
          POSTGRES_DB: iotpilot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://iotpilot:iotpilot@localhost:5432/iotpilot_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      INFLUXDB_URL: http://localhost:8087
      INFLUXDB_TOKEN: test-token
      INFLUXDB_ORG: iotpilot
      INFLUXDB_BUCKET: devices
      NEXT_PUBLIC_API_URL: ""
      DOMAIN: localhost
      APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6 # pnpm version comes from package.json "packageManager"

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install all workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @iotpilot/backend exec prisma generate --schema=./prisma/schema.prisma

      - name: Push database schema
        run: cd apps/backend && npx prisma db push --schema=./prisma/schema.prisma --accept-data-loss

      - name: Lint (frontend)
        run: cd apps/frontend && npm run lint

      - name: Type-check (all workspace packages via Turborepo)
        run: pnpm turbo type-check

      - name: Unit tests (frontend)
        run: cd apps/frontend && npm run test:unit -- --run

      - name: Integration tests (frontend)
        continue-on-error: true # TEMP: legacy-frontend integration tests need CI service setup; frontend is being replaced (fe-cutover). Non-blocking until then.
        run: cd apps/frontend && npm run test:integration -- --run

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ github.run_number }}
          path: apps/frontend/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Docker: validate compose config + build image
  # ──────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Validate Docker Compose config
        run: docker compose -f infra/docker/docker-compose.local.yml config

      - name: Build Docker image
        run: docker compose -f infra/docker/docker-compose.local.yml build --no-cache iotpilot-app
