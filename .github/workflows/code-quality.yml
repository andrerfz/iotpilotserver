name: Code Quality

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      run_full_analysis:
        description: 'Run full code analysis (slower)'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ==========================================
  # CODE QUALITY ANALYSIS
  # ==========================================
  quality:
    name: 'Code Quality Analysis'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Run ESLint with detailed reporting
        run: |
          cd apps/frontend
          npx eslint --ext .ts,.tsx --format=json --output-file=eslint-report.json src/ || true

      - name: Check for unused dependencies
        run: |
          cd apps/frontend
          npx depcheck --json > depcheck-report.json || true

      - name: Analyze bundle size
        run: |
          cd apps/frontend
          npx webpack-bundle-analyzer --mode=production --output=json > bundle-analysis.json || true

      - name: Check TypeScript strictness
        run: |
          cd apps/frontend
          npx tsc --noEmit --strict --noUnusedLocals --noUnusedParameters || true

      - name: Upload quality reports
        uses: actions/upload-artifact@v7
        with:
          name: code-quality-reports
          path: |
            apps/frontend/eslint-report.json
            apps/frontend/depcheck-report.json
            apps/frontend/bundle-analysis.json
          retention-days: 30

  # ==========================================
  # FULL ANALYSIS (when requested)
  # ==========================================
  full-analysis:
    name: 'Full Code Analysis'
    runs-on: ubuntu-latest
    if: github.event.inputs.run_full_analysis == 'true' || github.event.schedule == '0 9 * * 1'
    needs: [quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Run comprehensive test coverage analysis
        run: |
          cd apps/frontend
          npm run test -- --coverage --run --reporter=json --outputFile=test-results.json

      - name: Analyze test coverage trends
        run: |
          cd apps/frontend
          # This would typically compare against previous runs
          npx istanbul report --include coverage/coverage-final.json text-summary

      - name: Check for security vulnerabilities
        run: |
          cd apps/frontend
          npm audit --audit-level=moderate --json > security-audit.json || true

      - name: Performance analysis
        run: |
          cd apps/frontend
          # Run performance tests
          npm run test:performance -- --run --reporter=json > performance-results.json || true

      - name: Upload comprehensive reports
        uses: actions/upload-artifact@v7
        with:
          name: comprehensive-analysis-reports
          path: |
            apps/frontend/test-results.json
            apps/frontend/security-audit.json
            apps/frontend/performance-results.json
            apps/frontend/coverage/
          retention-days: 30

      - name: Generate quality summary
        run: |
          echo "## 📊 Code Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cd apps/frontend && npx istanbul report --include coverage/coverage-final.json text-summary || echo "Coverage report not available" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cd apps/frontend && npm audit --audit-level=moderate || echo "No critical vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
