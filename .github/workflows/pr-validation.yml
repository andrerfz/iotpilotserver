name: PR Validation

on:
  pull_request:
    branches: [main, main-ddd-migration]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11'

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Fast checks — no database, no Docker
  # ──────────────────────────────────────────────
  quick-check:
    name: Lint + type-check + unit tests
    runs-on: ubuntu-24.04-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # pnpm version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @iotpilot/backend exec prisma generate --schema=./prisma/schema.prisma

      - name: Lint
        run: cd apps/frontend && npm run lint

      - name: Type-check
        run: pnpm turbo type-check

      - name: Unit tests
        run: cd apps/frontend && npm run test:unit -- --run

  # ──────────────────────────────────────────────
  # Workspace lock validation (now same as quick-check install)
  # ──────────────────────────────────────────────
  workspace:
    name: pnpm lock validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # pnpm version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

  # ──────────────────────────────────────────────
  # PR status comment
  # ──────────────────────────────────────────────
  pr-comment:
    name: PR comment
    runs-on: ubuntu-24.04
    needs: [quick-check, workspace]
    if: always()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const quick = '${{ needs.quick-check.result }}';
            const ws    = '${{ needs.workspace.result }}';
            const ok    = quick === 'success' && ws === 'success';
            const icon  = ok ? '✅' : '❌';

            const row = (label, result) =>
              `| ${label} | ${result === 'success' ? '✅ Pass' : '❌ Fail'} |`;

            const body = [
              `## ${icon} PR Validation`,
              '',
              '| Check | Status |',
              '|---|---|',
              row('Lint + type-check + unit tests', quick),
              row('pnpm lock validation', ws),
              '',
              ok
                ? '**Ready for review. Full integration tests run on push to main.** 🎉'
                : '**Please fix the failing checks above.**',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
