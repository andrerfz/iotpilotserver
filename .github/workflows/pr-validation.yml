name: Pull Request Validation

on:
  pull_request:
    branches: [ main, develop, main-ddd-migration ]
    types: [opened, synchronize, reopened]

jobs:
  # ==========================================
  # QUICK VALIDATION - Fast feedback for PRs
  # ==========================================
  quick-check:
    name: 'Quick Validation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: |
          cd app
          npm ci

      - name: Run linting
        run: |
          cd app
          npm run lint

      - name: Check TypeScript compilation
        run: |
          cd app
          npx tsc --noEmit

      - name: Run unit tests only
        run: |
          cd app
          npm run test:unit -- --run --reporter=basic

      - name: Validate test coverage threshold
        run: |
          cd app
          npm run test:unit -- --coverage --run
          # Check if coverage meets minimum threshold
          npx istanbul check-coverage --statements 80 --branches 75 --functions 80 --lines 80

  # ==========================================
  # DOCKER BUILD CHECK
  # ==========================================
  docker-check:
    name: 'Docker Build Check'
    runs-on: ubuntu-latest
    needs: [quick-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images (quick check)
        run: |
          docker compose -f docker/docker-compose.yml build --no-cache --parallel

      - name: Validate Docker Compose configuration
        run: |
          docker compose -f docker/docker-compose.yml config

  # ==========================================
  # PR COMMENT WITH RESULTS
  # ==========================================
  pr-comment:
    name: 'PR Comment'
    runs-on: ubuntu-latest
    needs: [quick-check, docker-check]
    if: always()
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.quick-check.result }}' === 'success' && '${{ needs.docker-check.result }}' === 'success' ? '✅' : '❌';

            const body = `## ${status} Pull Request Validation Results

            ### Quick Checks
            - **Linting**: ${{ needs.quick-check.result === 'success' ? '✅ Passed' : '❌ Failed' }}
            - **TypeScript**: ${{ needs.quick-check.result === 'success' ? '✅ Passed' : '❌ Failed' }}
            - **Unit Tests**: ${{ needs.quick-check.result === 'success' ? '✅ Passed' : '❌ Failed' }}
            - **Coverage**: ${{ needs.quick-check.result === 'success' ? '✅ Passed' : '❌ Failed' }}

            ### Docker Build
            - **Build Check**: ${{ needs.docker-check.result === 'success' ? '✅ Passed' : '❌ Failed' }}
            - **Config Validation**: ${{ needs.docker-check.result === 'success' ? '✅ Passed' : '❌ Failed' }}

            ---
            ${status === '✅' ? '**Ready for review! 🎉**' : '**Please fix the issues above before review.**'}

            *This check runs unit tests and basic validation. Full test suite runs on push to main branch.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
