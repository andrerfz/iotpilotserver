# Development mode with hot reload
# Extends docker-compose.local.yml with development-specific overrides

services:
  iotpilot-app:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      target: development  # Use development stage instead of runner
      args:
        - NODE_ENV=development
    container_name: iotpilot-server-app  # Keep same name for Traefik/Cloudflare compatibility
    user: root  # Run as root in dev mode for write permissions
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source code for hot reload
      - ../app/src:/app/src:delegated
      - ../app/public:/app/public:delegated
      - ../app/tailwind.config.cjs:/app/tailwind.config.cjs
      - ../app/postcss.config.cjs:/app/postcss.config.cjs
      - ../app/package.json:/app/package.json
      - ../app/tsconfig.json:/app/tsconfig.json
      - ../app/next.config.cjs:/app/next.config.cjs
      - ../app/prisma:/app/prisma
      # Mount for data/logs
      - ../data:/app/data
      - ../logs:/app/logs
      # Prevent node_modules override
      - /app/node_modules
      - /app/.next
    command: ["./start-dev.sh"]
    # Labels are inherited from docker-compose.local.yml
    # This includes Traefik routing and Cloudflare tunnel configuration
